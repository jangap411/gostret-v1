      as="style"

                  <div
                    class="text-neutral-500 flex border-none bg-neutral-50 items-center justify-center pl-4 rounded-l-xl border-r-0"
                    data-icon="MagnifyingGlass"
                    data-size="24px"
                    data-weight="regular"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                      <path

                    value=""
                  />

              <div class="flex flex-col items-end gap-3">
                <div class="flex flex-col gap-0.5">
                  <button class="flex size-10 items-center justify-center rounded-t-xl bg-neutral-50 shadow-[0_2px_4px_rgba(0,0,0,0.1)]">
                    <div class="text-[#141414]" data-icon="Plus" data-size="24px" data-weight="regular">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                        <path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"></path>

                    </div>
                  </button>
                  <button class="flex size-10 items-center justify-center rounded-b-xl bg-neutral-50 shadow-[0_2px_4px_rgba(0,0,0,0.1)]">
                    <div class="text-[#141414]" data-icon="Minus" data-size="24px" data-weight="regular">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                        <path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128Z"></path>
                      </svg>
                    </div>
                  </button>
                </div>
                <button class="flex size-10 items-center justify-center rounded-xl bg-neutral-50 shadow-[0_2px_4px_rgba(0,0,0,0.1)]">
                  <div class="text-[#141414]" data-icon="NavigationArrow" data-size="24px" data-weight="regular">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256" transform="scale(-1, 1)">
                      <path
                        d="M229.33,98.21,53.41,33l-.16-.05A16,16,0,0,0,32.9,53.25a1,1,0,0,0,.05.16L98.21,229.33A15.77,15.77,0,0,0,113.28,240h.3a15.77,15.77,0,0,0,15-11.29l23.56-76.56,76.56-23.56a16,16,0,0,0,.62-30.38ZM224,113.3l-76.56,23.56a16,16,0,0,0-10.58,10.58L113.3,224h0l-.06-.17L48,48l175.82,65.22.16.06Z"
                      ></path>
                    </svg>
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="flex absolute top-0 left-0 h-full w-full flex-col justify-end items-stretch">
          <div class="flex flex-col items-stretch bg-neutral-50">
            <button class="flex h-5 w-full items-center justify-center"><div class="h-1 w-9 rounded-full bg-[#dbdbdb]"></div></button>
            <div class="flex-1">

                <div class="flex flex-col justify-center">
                  <p class="text-[#141414] text-base font-medium leading-normal line-clamp-1">Rider</p>
                  <p class="text-neutral-500 text-sm font-normal leading-normal line-clamp-2">Toyota Camry</p>
                </div>
              </div>
              <div class="flex items-center gap-4 bg-neutral-50 px-4 min-h-[72px] py-2">
                <div

                  style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB2oslRnJMDapk8mUtGAG2ulSySsomThb6FFTIYOgF-loqFxCAL-g903h4rsl-XsPYWEqqlxkGOJyx_U5VWdX0jwBt9mN66iJlWbVPWW5wsaDqwCW-eVxBQcjk_AtpH_a43OZk0zKkPhgTHVY5QHcxX6SsECeqeJFGWUeIWgiGL26a_Jy5QwHdsfBFN0ncWhclkBehTYtlC5QBN_JJa8swOVJPCXWxPUzaFT3vza_JdIDM38ZvGI_25A9uaeH95DeynfGawW5zLXpU");'
                ></div>
                <div class="flex flex-col justify-center">
                  <p class="text-[#141414] text-base font-medium leading-normal line-clamp-1">Rider</p>
                  <p class="text-neutral-500 text-sm font-normal leading-normal line-clamp-2">Arriving in 2 min</p>
                </div>
              </div>
              <div class="flex justify-stretch">
                <div class="flex flex-1 gap-3 flex-wrap px-4 py-3 justify-between">
                  <button
                    class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-black text-neutral-50 text-sm font-bold leading-normal tracking-[0.015em]"
                  >
                    <span class="truncate">Message</span>
                  </button>
                  <button
                    class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#ededed] text-[#141414] text-sm font-bold leading-normal tracking-[0.015em]"
                  >
                    <span class="truncate">Call</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="h-5 bg-neutral-50"></div>
      </div>
    </div>

</html>
